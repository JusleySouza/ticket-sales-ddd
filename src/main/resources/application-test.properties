spring.datasource.url=${CONNECTION_STRING:jdbc:h2:mem:testdb}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${USERNAME:test}
spring.datasource.password=${PASSWORD:test}

spring.jpa.database-platform=${DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.jpa.show-sql=${SHOW_SQL:false}

spring.h2.console.enabled=true